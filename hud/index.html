<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>JARVIS</title>
<style>
  :root { --c: #38e1ff; --dim: #0a1822; --bg: #03070d; }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; background: var(--bg); color: #cfeefb; overflow: hidden;
    font-family: -apple-system, "SF Pro Display", system-ui, sans-serif; }
  #app { height: 100%; display: grid; grid-template-columns: 360px 1fr 360px; }
  @media (max-width: 1100px) { #app { grid-template-columns: 1fr; } .rail.left, .rail { display: none; } }
  .stage { position: relative; display: flex; flex-direction: column; align-items: center;
    justify-content: center; gap: 22px; padding: 24px 0 130px; }
  canvas#orb { width: min(34vh, 380px); height: min(34vh, 380px); flex: none; }
  .caption { max-width: 760px; text-align: center; font-size: 1.4rem; line-height: 1.45;
    min-height: 2.4em; max-height: 38vh; overflow-y: auto; padding: 0 10px;
    text-shadow: 0 0 24px rgba(56,225,255,.25); }
  .caption::-webkit-scrollbar { width: 0; }
  .state { letter-spacing: .35em; text-transform: uppercase; font-size: .72rem; color: var(--c);
    opacity: .8; }
  .hint { position: absolute; bottom: 30px; font-size: .8rem; color: #4a6675; }
  .meter { position: absolute; bottom: 18px; width: 160px; height: 3px; background: #0e2330;
    border-radius: 2px; overflow: hidden; opacity: 0; transition: opacity .3s; }
  .meter.on { opacity: 1; }
  .meter i { display: block; height: 100%; width: 0; background: var(--c); transition: width .05s linear; }
  kbd { background: #11202c; border: 1px solid #1d3340; border-radius: 5px; padding: 1px 7px; color: var(--c); }
  /* side rails */
  .rail { background: linear-gradient(180deg,#04101a,#03080e); border-left: 1px solid #0d2330;
    display: flex; flex-direction: column; overflow: hidden; }
  .rail.left { border-left: none; border-right: 1px solid #0d2330; }
  .rail h2 { font-size: .7rem; letter-spacing: .3em; color: #3f6a7d; text-transform: uppercase;
    padding: 18px 20px 10px; display: flex; justify-content: space-between; align-items: baseline; }
  .rail h2 .stamp { letter-spacing: .05em; font-size: .62rem; color: #2f5263; text-transform: none; }
  /* cards */
  .cards { flex: 1; overflow-y: auto; padding: 0 16px 20px; display: flex; flex-direction: column; gap: 12px; }
  .cards::-webkit-scrollbar { width: 0; }
  .card { background: #06121c; border: 1px solid #0e2738; border-radius: 12px; padding: 13px 15px; }
  .card.muted { opacity: .55; }
  .card .ct { display: flex; align-items: center; gap: 7px; font-size: .72rem; letter-spacing: .18em;
    text-transform: uppercase; color: #6fb8d4; margin-bottom: 11px; }
  .card .ct .sdot { width: 7px; height: 7px; border-radius: 50%; background: #2a4350; }
  .card .ct .sdot.ok { background: #2ecc71; box-shadow: 0 0 7px #2ecc71; }
  .card .ct .sdot.error { background: #ff5a5a; box-shadow: 0 0 7px #ff5a5a; }
  .tiles { display: grid; grid-template-columns: 1fr 1fr; gap: 10px 12px; }
  .tile .lbl { font-size: .64rem; letter-spacing: .08em; color: #4d6f7e; text-transform: uppercase; }
  .tile .val { font-size: 1.5rem; font-weight: 600; color: #e8f8ff; line-height: 1.15; }
  .tile .dl { font-size: .72rem; font-weight: 600; }
  .dl.up { color: #2ecc71; } .dl.down { color: #ff6b6b; } .dl.flat { color: #5a7888; }
  .card .note { font-size: .74rem; color: #5d8294; margin-top: 9px; line-height: 1.4; }
  /* fleet card */
  .fleet-rows { display: flex; flex-direction: column; gap: 5px; margin-top: 10px; }
  .frow { display: flex; justify-content: space-between; font-size: .76rem; color: #9fc0cf; }
  .frow .ago { color: #4d6f7e; }
  .frow .dz { color: #ffb454; }
  .feed { flex: 1; overflow-y: auto; padding: 0 20px 20px; display: flex; flex-direction: column; gap: 8px; }
  .feed::-webkit-scrollbar { width: 0; }
  .tool { font-size: .82rem; color: #7fd6f0; background: #07151f; border: 1px solid #0e2a39;
    border-radius: 8px; padding: 8px 11px; animation: pop .25s ease; }
  .tool b { color: var(--c); }
  .tool small { color: #4a6675; display: block; margin-top: 2px; word-break: break-all; }
  .me { font-size: .82rem; color: #9fb4c0; border-left: 2px solid #1d3340; padding: 4px 0 4px 11px; }
  .jv { font-size: .82rem; color: #8fd2ea; padding: 5px 0 9px; border-bottom: 1px solid #0c1f2b; }
  @keyframes pop { from { opacity: 0; transform: translateY(6px); } }
  .btn { position: absolute; bottom: 70px; width: 78px; height: 78px; border-radius: 50%;
    border: 1px solid #1d3340; background: #07151f; color: var(--c); font-size: 1.6rem; cursor: pointer;
    transition: .15s; }
  .btn:hover { background: #0c2230; }
  .btn.live { background: var(--c); color: #02121a; box-shadow: 0 0 40px var(--c); }
  .dot { display:inline-block; width:7px; height:7px; border-radius:50%; background:#2a4350; margin-right:6px; }
  .dot.on { background: #2ecc71; box-shadow: 0 0 8px #2ecc71; }
</style>
</head>
<body>
<div id="app">
  <div class="rail left">
    <h2>Dashboard <span class="stamp" id="stamp"></span></h2>
    <div class="cards" id="cards"></div>
  </div>
  <div class="stage">
    <canvas id="orb"></canvas>
    <div class="state" id="state">connecting</div>
    <div class="caption" id="caption">Initializing systems.</div>
    <button class="btn" id="talk" title="Hold to talk (or press Space)">🎙</button>
    <div class="hint" id="hint"><b>Click anywhere once</b> to enable the mic, then hold <kbd>Space</kbd> or the mic to talk</div>
    <div class="meter" id="meter"><i id="mlevel"></i></div>
  </div>
  <div class="rail">
    <h2><span class="dot" id="conn"></span>Activity</h2>
    <div class="feed" id="feed"></div>
  </div>
</div>
<script>
const $ = (id) => document.getElementById(id);
const caption = $("caption"), stateEl = $("state"), feed = $("feed"), talk = $("talk"), conn = $("conn");
const hint = $("hint"), meter = $("meter"), mlevel = $("mlevel");

// ---------- websocket to the bridge ----------
let ws, wsReady = false;
function connect() {
  ws = new WebSocket(`ws://${location.host}`);
  ws.binaryType = "arraybuffer";
  ws.onopen = () => { wsReady = true; conn.classList.add("on"); setState("idle", "Online. Warming voice…"); };
  ws.onclose = () => { wsReady = false; conn.classList.remove("on"); setState("offline", "Bridge lost. Reconnecting…"); setTimeout(connect, 1500); };
  ws.onmessage = (e) => { if (typeof e.data === "string") handle(JSON.parse(e.data)); else enqueueAudio(e.data); };
}
let streamed = "";
function handle(m) {
  if (m.type === "voice-ready") setState("idle", restored ? null : "Online. Say the word.");
  else if (m.type === "history") renderHistory(m.items);
  else if (m.type === "transcribing") { setState("transcribing", "…"); mode = "thinking"; }
  else if (m.type === "transcript") { if (m.text) addMe(m.text); }
  else if (m.type === "thinking") { streamed = ""; setState("thinking", "…"); mode = "thinking"; }
  else if (m.type === "delta") { streamed += m.text; caption.textContent = streamed; caption.scrollTop = caption.scrollHeight; }
  else if (m.type === "tool") addTool(m.name, m.input);
  else if (m.type === "result") { const t = m.text || streamed; caption.textContent = t || "Done."; caption.scrollTop = 0; }
  else if (m.type === "speak-start") { mode = "speaking"; setState("speaking", caption.textContent); }
  else if (m.type === "speak-end") { speakEnded = true; if (!aplaying) finishSpeaking(); }
  else if (m.type === "idle") { mode = "idle"; setState("idle", caption.textContent); }
  else if (m.type === "busy") setState("thinking", "One thing at a time…");
  else if (m.type === "error") { setState("idle", "Error: " + m.text); mode = "idle"; }
}
function addTool(name, input) {
  const d = document.createElement("div");
  d.className = "tool";
  d.innerHTML = `<b>${name}</b>${input ? `<small>${escape(input)}</small>` : ""}`;
  feed.appendChild(d); feed.scrollTop = feed.scrollHeight;
}
function addMe(text) {
  const d = document.createElement("div"); d.className = "me"; d.textContent = "“" + text + "”";
  feed.appendChild(d); feed.scrollTop = feed.scrollHeight;
}
function addJarvis(text) {
  const d = document.createElement("div"); d.className = "jv"; d.textContent = text;
  feed.appendChild(d); feed.scrollTop = feed.scrollHeight;
}
let restored = false;
function renderHistory(items) {
  if (!items || !items.length) return;
  feed.innerHTML = ""; let lastJ = "";
  for (const it of items) { if (it.role === "you") addMe(it.text); else { addJarvis(it.text); lastJ = it.text; } }
  if (lastJ) { restored = true; setState("idle", lastJ); caption.scrollTop = 0; }
}
const escape = (s) => String(s ?? "").replace(/[&<>]/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;" }[c]));
function setState(s, cap) { stateEl.textContent = s; if (cap != null) caption.textContent = cap; }
function sendPrompt(text) { if (!wsReady || !text.trim()) return; addMe(text); ws.send(JSON.stringify({ type: "prompt", text })); }

// ---------- audio engine: mic capture (STT in) + playback (TTS out) ----------
let mode = "idle", level = 0, listening = false;
let actx = null, micAnalyser = null, playAnalyser = null;
let capturing = false, capBuf = [];
const tmp = new Uint8Array(256);

async function initAudio() {
  if (actx) { if (actx.state === "suspended") actx.resume(); return; }
  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      audio: { channelCount: 1, echoCancellation: true, noiseSuppression: true, autoGainControl: true },
    });
    actx = new AudioContext();
    const src = actx.createMediaStreamSource(stream);
    micAnalyser = actx.createAnalyser(); micAnalyser.fftSize = 512; src.connect(micAnalyser);
    playAnalyser = actx.createAnalyser(); playAnalyser.fftSize = 512;
    // raw PCM capture via ScriptProcessor, routed to a muted sink so it runs without echo
    const proc = actx.createScriptProcessor(4096, 1, 1);
    proc.onaudioprocess = (e) => { if (capturing) capBuf.push(new Float32Array(e.inputBuffer.getChannelData(0))); };
    src.connect(proc);
    const mute = actx.createGain(); mute.gain.value = 0; proc.connect(mute); mute.connect(actx.destination);
    clapLoop();
    hint.innerHTML = '🎙 mic armed · hold <kbd>Space</kbd> or the mic button to talk';
    meter.classList.add("on");
  } catch { hint.textContent = "Mic blocked — allow microphone access in the browser, then reload."; }
}
// keep audio alive when you refocus the window (browsers suspend it in the background)
addEventListener("visibilitychange", () => { if (!document.hidden && actx) actx.resume(); });
addEventListener("focus", () => { if (actx) actx.resume(); });

function startListen() {
  if (!actx || listening || mode === "thinking") return;
  stopPlayback(); // barge-in: interrupt Jarvis if he's mid-sentence
  listening = true; mode = "listening"; capturing = true; capBuf = [];
  talk.classList.add("live"); setState("listening", "Listening…");
}
function stopListen() {
  if (!listening) return;
  listening = false; capturing = false; talk.classList.remove("live");
  const pcm = mergeDownsample(capBuf, actx.sampleRate, 16000); capBuf = [];
  if (pcm.length < 2400) { mode = "idle"; setState("idle", "…"); return; } // <0.15s = noise
  mode = "thinking"; setState("transcribing", "…");
  if (wsReady) ws.send(pcm.buffer);
}
function mergeDownsample(chunks, inRate, outRate) {
  let len = 0; for (const c of chunks) len += c.length;
  const merged = new Float32Array(len); let o = 0; for (const c of chunks) { merged.set(c, o); o += c.length; }
  if (inRate === outRate) return merged;
  const ratio = inRate / outRate, outLen = Math.floor(len / ratio), out = new Float32Array(outLen);
  for (let i = 0; i < outLen; i++) { // box-filter average = anti-alias, much cleaner STT
    const a = Math.floor(i * ratio), b = Math.min(len, Math.floor((i + 1) * ratio));
    let s = 0; for (let j = a; j < b; j++) s += merged[j];
    out[i] = b > a ? s / (b - a) : 0;
  }
  return out;
}

// ---------- playback queue (TTS audio streamed from the bridge) ----------
let aqueue = [], aplaying = false, curSrc = null, speakEnded = false;
async function enqueueAudio(arrayBuffer) {
  if (!actx) return;
  try { aqueue.push(await actx.decodeAudioData(arrayBuffer.slice(0))); if (!aplaying) playNext(); } catch {}
}
function playNext() {
  if (!aqueue.length) { aplaying = false; if (speakEnded) finishSpeaking(); return; }
  aplaying = true; mode = "speaking";
  curSrc = actx.createBufferSource(); curSrc.buffer = aqueue.shift();
  curSrc.connect(playAnalyser); playAnalyser.connect(actx.destination);
  curSrc.onended = () => { curSrc = null; playNext(); };
  curSrc.start();
}
function stopPlayback() { aqueue = []; speakEnded = false; if (curSrc) { try { curSrc.onended = null; curSrc.stop(); } catch {} curSrc = null; } aplaying = false; }
function finishSpeaking() { speakEnded = false; if (mode === "speaking") { mode = "idle"; setState("idle", caption.textContent); } }

// ---------- mic level + (optional) double-clap wake ----------
const CLAP_WAKE = false; // off by default — push-to-talk (Space/mic) is primary. Flip to true to re-enable.
function clapLoop() {
  let lastClap = 0, claps = 0, prev = 0;
  setInterval(() => {
    if (!micAnalyser) return;
    micAnalyser.getByteTimeDomainData(tmp);
    let peak = 0; for (const v of tmp) peak = Math.max(peak, Math.abs(v - 128));
    mlevel.style.width = Math.min(100, (peak / 128) * 200) + "%"; // live mic level
    const now = performance.now();
    if (CLAP_WAKE && peak > 95 && prev < 45 && now - lastClap > 180 && !listening && mode !== "thinking") {
      claps = now - lastClap < 800 ? claps + 1 : 1; lastClap = now;
      if (claps >= 2) { claps = 0; startListen(); }
    }
    prev = peak;
  }, 40);
}
function readPeak(an) {
  an.getByteTimeDomainData(tmp);
  let p = 0; for (const v of tmp) p = Math.max(p, Math.abs(v - 128));
  return p / 128;
}

// ---------- push to talk ----------
talk.onmousedown = startListen; talk.onmouseup = stopListen; talk.onmouseleave = () => listening && stopListen();
talk.ontouchstart = (e) => { e.preventDefault(); startListen(); };
talk.ontouchend = (e) => { e.preventDefault(); stopListen(); };
addEventListener("keydown", (e) => { if (e.code === "Space" && !e.repeat) { e.preventDefault(); startListen(); } });
addEventListener("keyup", (e) => { if (e.code === "Space") { e.preventDefault(); stopListen(); } });

// ---------- the orb ----------
const cv = $("orb"), g = cv.getContext("2d");
function size() { const d = devicePixelRatio || 1; cv.width = cv.clientWidth * d; cv.height = cv.clientHeight * d; }
addEventListener("resize", size); size();
let t = 0;
(function draw() {
  t += 0.016; const w = cv.width, h = cv.height, cx = w / 2, cy = h / 2;
  g.clearRect(0, 0, w, h);
  const base = Math.min(w, h) * 0.28;
  // drive the orb from real audio: mic while listening, Jarvis's voice while speaking
  let target = mode === "listening" && micAnalyser ? readPeak(micAnalyser)
             : mode === "speaking" && playAnalyser ? readPeak(playAnalyser) : 0;
  level = level * 0.75 + target * 0.25;
  const react = mode === "listening" ? level * base * 1.6
              : mode === "speaking" ? (0.1 + level * 1.5) * base
              : mode === "thinking" ? (Math.sin(t * 6) * 0.5 + 0.5) * base * 0.35
              : Math.sin(t * 1.5) * base * 0.05;
  const col = mode === "thinking" ? "180,120,255" : mode === "listening" ? "56,225,255" : mode === "speaking" ? "120,255,200" : "40,120,160";
  for (let i = 3; i >= 0; i--) {
    const r = base + react + i * (base * 0.16);
    g.beginPath(); g.arc(cx, cy, r, 0, Math.PI * 2);
    g.fillStyle = `rgba(${col}, ${0.06 + (3 - i) * 0.02})`; g.fill();
  }
  // rotating ring
  g.save(); g.translate(cx, cy); g.rotate(t * 0.4);
  g.beginPath(); g.arc(0, 0, base + react, -0.6, 2.0); g.strokeStyle = `rgba(${col},0.9)`;
  g.lineWidth = Math.max(2, w * 0.004); g.stroke(); g.restore();
  g.beginPath(); g.arc(cx, cy, base + react, 0, Math.PI * 2);
  g.fillStyle = `rgba(${col},0.10)`; g.fill();
  requestAnimationFrame(draw);
})();

// ---------- dashboard cards ----------
const cardsEl = $("cards"), stampEl = $("stamp");
function ago(iso) {
  if (!iso) return "";
  const s = (Date.now() - new Date(iso)) / 1000;
  if (s < 90) return "just now";
  if (s < 3600) return Math.round(s / 60) + "m ago";
  if (s < 86400) return Math.round(s / 3600) + "h ago";
  return Math.round(s / 86400) + "d ago";
}
const arrow = (d) => (d === "up" ? " ↑" : d === "down" ? " ↓" : "");
async function refreshState() {
  let st; try { st = await (await fetch("/state", { cache: "no-store" })).json(); } catch { return; }
  const out = [];
  if (st.fleet) {
    const f = st.fleet;
    const rows = (f.recent || []).slice(0, 5).map((r) =>
      `<div class="frow"><span>${escape(r.name)}</span><span>${r.dirty ? `<span class="dz">⚠ ${r.dirty}</span> ` : ""}<span class="ago">${escape(r.ago)}</span></span></div>`).join("");
    out.push(`<div class="card"><div class="ct"><span class="sdot ok"></span>Fleet</div>
      <div class="tiles"><div class="tile"><div class="lbl">Projects</div><div class="val">${f.total ?? "—"}</div></div>
      <div class="tile"><div class="lbl">Uncommitted</div><div class="val">${f.dirty ?? "—"}</div></div></div>
      <div class="fleet-rows">${rows}</div></div>`);
  }
  for (const c of st.cards || []) {
    const ok = c.status === "ok";
    const tiles = (c.tiles || []).map((t) =>
      `<div class="tile"><div class="lbl">${escape(t.label)}</div><div class="val">${escape(t.value ?? "—")}</div>${t.delta ? `<div class="dl ${t.dir || "flat"}">${escape(t.delta)}${arrow(t.dir)}</div>` : ""}</div>`).join("");
    out.push(`<div class="card ${ok ? "" : "muted"}"><div class="ct"><span class="sdot ${c.status === "error" ? "error" : ok ? "ok" : ""}"></span>${escape(c.title || c.source)}</div>
      ${tiles ? `<div class="tiles">${tiles}</div>` : ""}${c.note ? `<div class="note">${escape(c.note)}</div>` : ""}</div>`);
  }
  if (!out.length) out.push(`<div class="card muted"><div class="ct"><span class="sdot"></span>Dashboard</div><div class="note">Run <b>pnpm scan</b> and <b>pnpm metrics</b> to populate.</div></div>`);
  cardsEl.innerHTML = out.join("");
  const stamps = [st.fleet?.updatedAt, st.metricsUpdatedAt].filter(Boolean).sort();
  stampEl.textContent = stamps.length ? "updated " + ago(stamps[stamps.length - 1]) : "";
}

// boot (audio needs a user gesture on some browsers — first click/space also kicks it)
connect();
refreshState(); setInterval(refreshState, 60000);
addEventListener("pointerdown", () => { initAudio(); }, { once: true });
addEventListener("keydown", () => { initAudio(); }, { once: true });
</script>
</body>
</html>
